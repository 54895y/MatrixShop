Title:
  - '&8账本 &7{page}/{max-page}'

Options:
  Modules:
    - system_shop
    - player_shop
    - global_market
    - auction
    - chestshop
    - transaction
    - cart
    - mailbox

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#F#I#E#K#'
  - 'P###R###N'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'records'
  'F':
    material: 'HOPPER'
    name: '&e轮换筛选'
    lore:
      - '&7当前模块过滤: &f{module-filter}'
  'I':
    material: 'EMERALD'
    name: '&a收入'
    lore:
      - '&7总收入: &a{income-total}'
      - '&7打开收入统计'
  'E':
    material: 'REDSTONE'
    name: '&c支出'
    lore:
      - '&7总支出: &c{expense-total}'
      - '&7打开支出统计'
  'K':
    material: 'BOOK'
    name: '&f账本信息'
    lore:
      - '&7可见条目: &f{size}'
      - '&7关键词: &f{keyword}'
      - '&7模块过滤: &f{module-filter}'
      - '&7使用 {command} filter <module|all>'
  'R':
    material: 'BARRIER'
    name: '&c关闭'
    actions:
      left:
        - 'close'
  'P':
    material: 'ARROW'
    name: '&a上一页'
  'N':
    material: 'ARROW'
    name: '&a下一页'

template:
  name: '&f{module} &7/ &b{type}'
  lore:
    - '&7时间: &f{time}'
    - '&7金额: &f{money}'
    - '&7备注: &f{note}'
    - '&7原因: &f{admin_reason}'
    - '&7编号: &f{id}'
