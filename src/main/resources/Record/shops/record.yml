Bindings:
  Commands:
    Bindings:
      - 'record'
      - 'records'
    Register: true
    Show-In-Help: true
    Priority: 100
    Condition: 'perm matrixshop.record.use'
    Help: |-
      <rainbow>==========&fRecord Help<rainbow>==========
      /{binding} help Open this help
      /{binding} open [keyword] Open this ledger
      /{binding} detail <id> Open one record detail
      /{binding} filter [module|all] Change the module filter
      /{binding} income | expense Open statistics
      /ms open {typed-id} Open this ledger by typed id

Options:
  Modules:
    - system_shop
    - player_shop
    - global_market
    - auction
    - chestshop
    - transaction
    - cart
    - mailbox

Title:
  - '&8Ledger &7{shop-id} &7{page}/{max-page}'

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#F#I#E#K#'
  - 'P###R###N'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'records'
  'F':
    material: 'HOPPER'
    name: '&eCycle Filter'
    lore:
      - '&7Current module filter: &f{module-filter}'
  'I':
    material: 'EMERALD'
    name: '&aIncome'
    lore:
      - '&7Total income: &a{income-total}'
      - '&7Open income statistics'
  'E':
    material: 'REDSTONE'
    name: '&cExpense'
    lore:
      - '&7Total expense: &c{expense-total}'
      - '&7Open expense statistics'
  'K':
    material: 'BOOK'
    name: '&fLedger Info'
    lore:
      - '&7Visible entries: &f{size}'
      - '&7Keyword: &f{keyword}'
      - '&7Module filter: &f{module-filter}'
      - '&7Use /record filter <module|all>'
  'R':
    material: 'BARRIER'
    name: '&cClose'
    actions:
      left:
        - 'close'
  'P':
    material: 'ARROW'
    name: '&aPrevious'
  'N':
    material: 'ARROW'
    name: '&aNext'

template:
  name: '&f{module} &7/ &b{type}'
  lore:
    - '&7Time: &f{time}'
    - '&7Money: &f{money}'
    - '&7Note: &f{note}'
    - '&7Reason: &f{admin_reason}'
    - '&7Id: &f{id}'
