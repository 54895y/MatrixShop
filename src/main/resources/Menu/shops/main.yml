Bindings:
  Commands:
    Bindings:
      - 'menu'
      - 'mainmenu'
    Register: true
    Show-In-Help: true
    Priority: 100
    Help-Key: '@commands.bindings.menu'

Title:
  - '&8MatrixShop Menu &7{shop-id}'

layout:
  - '#########'
  - '#S#P#G#A#'
  - '#########'
  - '#T#C#R#X#'
  - '#########'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'S':
    material: 'DIAMOND'
    name: '&bSystem Shop'
    lore:
      - '&7Open the default system shop'
    actions:
      left:
        - 'matrixshop open systemshop:weapon'
  'P':
    material: 'CHEST'
    name: '&aPlayer Shop'
    lore:
      - '&7Open your player shop'
    actions:
      left:
        - 'matrixshop open playershop:default'
  'G':
    material: 'ENDER_CHEST'
    name: '&6Global Market'
    lore:
      - '&7Open the global market'
    actions:
      left:
        - 'matrixshop open globalmarket:default'
  'A':
    material: 'GOLD_INGOT'
    name: '&eAuction'
    lore:
      - '&7Open the auction hall'
    actions:
      left:
        - 'matrixshop open auction:default'
  'T':
    material: 'NAME_TAG'
    name: '&dTrade'
    lore:
      - '&7Open the trade hub'
    actions:
      left:
        - 'matrixshop open transaction:default'
  'C':
    material: 'MINECART'
    name: '&fCart'
    lore:
      - '&7Open your shopping cart'
    actions:
      left:
        - 'matrixshop open cart:cart'
  'R':
    material: 'BOOK'
    name: '&fRecord'
    lore:
      - '&7Open your ledger'
    actions:
      left:
        - 'matrixshop open record:record'
  'X':
    material: 'BARRIER'
    name: '&cClose'
    actions:
      left:
        - 'close'
