Bindings:
  Commands:
    Bindings:
      - 'menu'
      - 'mainmenu'
    Register: true
    Show-In-Help: true
    Priority: 100

Title:
  - '&8MatrixShop 菜单 &7{shop-id}'

layout:
  - '#########'
  - '#S#P#G#A#'
  - '#########'
  - '#T#C#R#X#'
  - '#########'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'S':
    material: 'DIAMOND'
    name: '&b系统商店'
    lore:
      - '&7打开默认系统商店'
    actions:
      left:
        - 'matrixshop open systemshop:weapon'
  'P':
    material: 'CHEST'
    name: '&a玩家商店'
    lore:
      - '&7打开你的玩家商店'
    actions:
      left:
        - 'matrixshop open playershop:default'
  'G':
    material: 'ENDER_CHEST'
    name: '&6全球市场'
    lore:
      - '&7打开全球市场'
    actions:
      left:
        - 'matrixshop open globalmarket:default'
  'A':
    material: 'GOLD_INGOT'
    name: '&e拍卖行'
    lore:
      - '&7打开拍卖大厅'
    actions:
      left:
        - 'matrixshop open auction:default'
  'T':
    material: 'NAME_TAG'
    name: '&d交易'
    lore:
      - '&7打开交易中心'
    actions:
      left:
        - 'matrixshop open transaction:default'
  'C':
    material: 'MINECART'
    name: '&f购物车'
    lore:
      - '&7打开你的购物车'
    actions:
      left:
        - 'matrixshop cart open'
  'R':
    material: 'BOOK'
    name: '&f账本'
    lore:
      - '&7打开交易记录'
    actions:
      left:
        - 'matrixshop record open'
  'X':
    material: 'BARRIER'
    name: '&c关闭'
    actions:
      left:
        - 'close'
