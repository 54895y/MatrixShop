Bindings:
  Commands:
    Bindings:
      - 'auction'
      - 'ah'
    Register: true
    Show-In-Help: true
    Priority: 100
    Help-Key: '@commands.bindings.auction'
    Hint-Keys:
      open: '@commands.bindings.auction'
      bid: '@commands.hints.auction-bid'
      upload-english: '@commands.hints.auction-upload-english'
      upload-dutch: '@commands.hints.auction-upload-dutch'
    Help:
      - '&7拍卖模块支持英式拍卖与荷兰式拍卖。'
      - '&7打开大厅: &f{command} open'
      - '&7上架物品: &f{command} upload <english|dutch> <起拍价> [一口价|结束价] [时长]'
      - '&7出价: &f{command} bid <id> [价格]'
      - '&7管理自己的拍卖: &f{command} manage'

Currency:
  Key: vault

Title:
  - '&8拍卖大厅 &7{page}/{max-page}'

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '##U#B#M##'
  - 'P###R###N'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'goods'
  'U':
    material: 'CHEST'
    name: '&a上架'
    lore:
      - '&7打开上架说明'
  'B':
    material: 'GOLD_INGOT'
    name: '&6我的出价'
    lore:
      - '&7查看你参与出价的拍卖'
  'M':
    material: 'BOOK'
    name: '&f我的拍卖'
    lore:
      - '&7管理你当前的上架'
  'R':
    material: 'BARRIER'
    name: '&c关闭'
    actions:
      left:
        - 'close'
  'P':
    material: 'ARROW'
    name: '&a上一页'
  'N':
    material: 'ARROW'
    name: '&a下一页'
