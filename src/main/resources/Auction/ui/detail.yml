Title:
  - '&8拍卖详情 - {id}'

layout:
  - '#########'
  - '###i#####'
  - '##P#N#B##'
  - '##T#O#S##'
  - '###M#R###'
  - '#########'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'i':
    material: 'AIR'
    name: '&f{id}'
  'P':
    material: 'GOLD_INGOT'
    name: '&f当前价格'
    lore:
      - '&e{current-price}'
  'N':
    material: 'PAPER'
    name: '&f下一口最低价'
    lore:
      - '&e{next-bid}'
  'B':
    material: 'EMERALD'
    name: '&a出价 / 购买'
    lore:
      - '&7英式拍卖: 打开出价菜单'
      - '&7荷式拍卖: 按当前价购买'
  'T':
    material: 'EMERALD_BLOCK'
    name: '&a一口价购买'
    lore:
      - '&7一口价: &e{buyout}'
  'O':
    material: 'BOOK'
    name: '&f概览'
    lore:
      - '&7模式: &f{mode}'
      - '&7卖家: &f{owner}'
      - '&7最高出价者: &f{highest-bidder}'
  'S':
    material: 'WATCH'
    name: '&f剩余时间'
    lore:
      - '&7剩余: &f{remain}'
  'M':
    material: 'BARRIER'
    name: '&c下架我的拍卖'
  'R':
    material: 'ARROW'
    name: '&a返回'
