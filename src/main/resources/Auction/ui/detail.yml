Title:
  - '&8Auction Detail - {id}'

layout:
  - '#########'
  - '###i#####'
  - '##P#N#B##'
  - '##T#O#S##'
  - '###M#R###'
  - '#########'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'i':
    material: 'AIR'
    name: '&f{id}'
  'P':
    material: 'GOLD_INGOT'
    name: '&fCurrent Price'
    lore:
      - '&e{current-price}'
  'N':
    material: 'PAPER'
    name: '&fNext Minimum'
    lore:
      - '&e{next-bid}'
  'B':
    material: 'EMERALD'
    name: '&aBid / Buy'
    lore:
      - '&7English: open bid menu'
      - '&7Dutch: buy at current price'
  'T':
    material: 'EMERALD_BLOCK'
    name: '&aBuyout'
    lore:
      - '&7Buyout price: &e{buyout}'
  'O':
    material: 'BOOK'
    name: '&fOverview'
    lore:
      - '&7Mode: &f{mode}'
      - '&7Owner: &f{owner}'
      - '&7Highest: &f{highest-bidder}'
  'S':
    material: 'WATCH'
    name: '&fTime Left'
    lore:
      - '&7Remaining: &f{remain}'
  'M':
    material: 'BARRIER'
    name: '&cRemove My Listing'
  'R':
    material: 'ARROW'
    name: '&aBack'
