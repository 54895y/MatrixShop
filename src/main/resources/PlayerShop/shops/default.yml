Bindings:
  Commands:
    Bindings:
      - 'player_shop'
      - 'playershop'
      - 'pshop'
    Register: true
    Show-In-Help: true
    Priority: 100
    Help-Key: '@commands.bindings.player-shop'
    Hint-Keys:
      open: '@commands.bindings.player-shop'
      upload: '@player-shop.hints.upload-command'
    Help:
      - '&7玩家商店使用当前商店入口对应的 shop 文件。'
      - '&7打开自己的店铺: &f{command} open'
      - '&7查看其他玩家: &f{command} open <玩家>'
      - '&7上架主手物品: &f{command} upload <价格> [数量]'

Currency:
  Key: vault

Title:
  - '&8{owner}的商店 &7{page}/{max-page}'

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '###I#E###'
  - 'P###B###N'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'goods'
  'I':
    material: 'PAPER'
    name: '&f商店信息'
    lore:
      - '&7店主: &f{owner}'
      - '&7已上架: &f{listed}'
      - '&7你的余额: &e{money}'
  'E':
    material: 'BOOK'
    name: '&e编辑我的商店'
    lore:
      - '&7仅店主可见'
      - '&e左键打开编辑界面'
  'B':
    material: 'BARRIER'
    name: '&c关闭'
    actions:
      left:
        - 'close'
  'P':
    material: 'ARROW'
    name: '&a上一页'
  'N':
    material: 'ARROW'
    name: '&a下一页'
