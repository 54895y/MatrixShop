id: weapon

Title:
  - '&8武器商店'

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '####I####'
  - '####R####'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'goods'
  'I':
    material: 'BOOK'
    name: '&f商店说明'
    lore:
      - '&7点击商品进入确认界面'
      - '&7第一版仅实现基础购买流程'
  'R':
    material: 'BARRIER'
    name: '&c返回'
    actions:
      left:
        - 'back'

template:
  name: '&f{name}'
  lore:
    - '&7价格: &e{price} {currency}'
    - '&7单次上限: &f{limit}'
    - '&7余额: &f{has_currency}'
    - ''
    - '&e左键进入购买确认'

Currency:
  Key: vault

goods:
  - starter_weapons
  - diamond_sword
  - bow
  - arrow_bundle

# 刷新示例（默认不启用）
