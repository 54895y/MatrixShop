Bindings:
  Commands:
    Bindings:
      - 'trade'
      - 'tm'
    Register: true
    Show-In-Help: true
    Priority: 100
    Help-Key: '@commands.bindings.transaction'
    Hint-Keys:
      open: '@commands.bindings.transaction'
      request: '@commands.hints.transaction-request'
      money: '@commands.hints.transaction-money'
      exp: '@commands.hints.transaction-exp'

Title:
  - '&8Trade Hub &7{shop-id}'

layout:
  - '#########'
  - '###R#A###'
  - '#########'
  - '###L#####'
  - '#########'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'R':
    material: 'NAME_TAG'
    name: '&aRequest Trade'
    lore:
      - '&7{hint-request} <player>'
  'A':
    material: 'EMERALD'
    name: '&fActive Trade'
    lore:
      - '&7Open your current trade session'
  'L':
    material: 'BOOK'
    name: '&6Trade Records'
    lore:
      - '&7Open transaction records'
