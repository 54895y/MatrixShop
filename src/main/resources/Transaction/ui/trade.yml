Title:
  - '&8交易中 - {self} -> {target}'

layout:
  - 'AAA#BBB##'
  - 'AAA#BBB##'
  - 'AAA#BBB##'
  - '##M#E#T##'
  - '##R#C#Q##'
  - '#########'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'A':
    material: 'AIR'
    mode: 'self-offer'
    name: '&a我的报价'
  'B':
    material: 'AIR'
    mode: 'target-offer'
    name: '&b对方报价'
  'M':
    material: 'GOLD_INGOT'
    name: '&6金币出价'
    lore:
      - '&7当前: &e{self-money}'
      - '&7{hint-money} <amount>'
      - '&7右键清空'
  'E':
    material: 'EXP_BOTTLE'
    name: '&a经验出价'
    lore:
      - '&7当前: &f{self-exp}'
      - '&7{hint-exp} <amount>'
      - '&7右键清空'
  'T':
    material: 'PAPER'
    name: '&f对方摘要'
    lore:
      - '&7金币: &e{target-money}'
      - '&7经验: &f{target-exp}'
      - '&7已准备: &f{target-ready}'
      - '&7Shift+点击背包物品可快速放入'
  'R':
    material: 'SLIME_BALL'
    name: '&a准备完成'
    lore:
      - '&7任何改动都会重置双方准备状态'
  'C':
    material: 'EMERALD_BLOCK'
    name: '&a确认'
    lore:
      - '&7双方都准备后进入最终确认'
  'Q':
    material: 'BARRIER'
    name: '&c取消交易'
