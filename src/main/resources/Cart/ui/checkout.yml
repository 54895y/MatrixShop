    material: 'BOOK'
    name: '&f结算模式'
    lore:
      - '&7模式: &f{checkout-mode}'
      - '&7来源过滤: &f{source-filter}'
  'F':
    material: 'HOPPER'
    name: '&e查看冲突'
  'C':
    material: 'LIME_WOOL'
    name: '&a确认结算'
  'R':
    material: 'BARRIER'
    name: '&c返回购物车'
  'P':
    material: 'ARROW'
    name: '&a上一页'
  'N':
    material: 'ARROW'
    name: '&a下一页'

template:
  name: '&f{name}'
