Title:
  - '&8购物车结算 &7{page}/{max-page}'

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '##S#I#F##'
  - 'P###C#R#N'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'checkout'
  'S':
    material: 'PAPER'
    name: '&f结算概览'
