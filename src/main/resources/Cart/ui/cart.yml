Title:
  - '&8购物车 &7{page}/{max-page}'

Options:
  Source-Modules:
    - system_shop
    - player_shop
    - global_market

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '##K#V#X##'
  - 'P#A#C#R#N'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'goods'
  'K':
    material: 'BOOK'
    name: '&f购物车信息'
    lore:
      - '&7条目数: &f{size}'
      - '&7预计总价: &e{estimate-total}'
      - '&7拍卖关注条目: &f{auction-watch-size}'
      - '&7来源过滤: &f{source-filter}'
  'V':
    material: 'HOPPER'
    name: '&e清理失效条目'
  'X':
    material: 'LAVA_BUCKET'
    name: '&c清空购物车'
  'A':
    material: 'PAPER'
    name: '&b修改数量'
    lore:
      - '&7使用命令:'
      - '&f{command} amount <slot> <number>'
  'C':
    material: 'LIME_WOOL'
    name: '&a打开结算页'
  'R':
    material: 'BARRIER'
    name: '&c关闭'
    actions:
      left:
        - 'close'
  'P':
    material: 'ARROW'
    name: '&a上一页'
  'N':
    material: 'ARROW'
    name: '&a下一页'

template:
  name: '&f{name}'
  lore:
    - '&7来源: &f{source-module}'
    - '&7来源标识: &f{source-id}'
    - '&7快照价格: &e{snapshot-price} {currency}'
    - '&7当前价格: &6{current-price} {currency}'
    - '&7数量: &f{amount}'
    - '&7状态: &f{state}'
    - '&7限制: &f{limitation}'
    - '&7加入时间: &f{created-at}'
    - '&7槽位: &f{slot}'
    - '&7原因: &f{reason}'
