Bindings:
  Commands:
    Bindings:
      - 'gm'
      - 'market'
    Register: true
    Show-In-Help: true
    Priority: 100
    Help-Key: '@commands.bindings.global-market'
    Hint-Keys:
      open: '@commands.bindings.global-market'
      upload: '@commands.hints.global-market-upload'
    Help:
      - '&7全球市场用于跨玩家公开上架。'
      - '&7打开市场: &f{command} open'
      - '&7上架主手物品: &f{command} upload <价格> [数量]'
      - '&7管理你的上架: &f{command} manage'

Currency:
  Key: vault

Title:
  - '&8全球市场 &7{page}/{max-page}'

layout:
  - '#########'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '##U#C#M##'
  - 'P###R###N'

icons:
  '#':
    material: 'STAINED_GLASS_PANE'
    name: ' '
  'g':
    material: 'AIR'
    mode: 'goods'
  'U':
    material: 'CHEST'
    name: '&a上架'
    lore:
      - '&7打开当前市场的上架说明'
  'C':
    material: 'CHEST_MINECART'
    name: '&6购物车'
    lore:
      - '&7打开你的购物车'
  'M':
    material: 'BOOK'
    name: '&d我的上架'
    lore:
      - '&7管理你在当前市场的商品'
  'R':
    material: 'BARRIER'
    name: '&c关闭'
    actions:
      left:
        - 'close'
  'P':
    material: 'ARROW'
    name: '&a上一页'
  'N':
    material: 'ARROW'
    name: '&a下一页'
